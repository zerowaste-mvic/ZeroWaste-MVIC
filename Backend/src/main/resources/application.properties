spring.application.name=zerowaste

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/zerowaste
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ──
app.jwt.secret=ZeroWasteSecretKeyChangeThisInProductionMustBeAtLeast32Chars
app.jwt.expiration-ms=86400000

# ── CORS (Vite dev server) ──
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ── Email verification ──
# Base URL of the frontend app, used to build the link sent in the verification email.
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# 2FA OTP service configuration
# ── Mail (Gmail SMTP) ──
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables (use an App Password for Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:zerowaste.official2026@gmail.com}
spring.mail.password=${MAIL_PASSWORD:zjsleagwsykszbpm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_USERNAME:zerowaste.official2026@gmail.com}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:*}

# ── 2FA OTP ──
# How long (minutes) the OTP is valid before it expires
app.2fa.otp-expiry-minutes=10

# ── Expiry Alerts ──
# How many days before (and including the day of) expiry to trigger an alert.
app.expiry-alerts.days-before=7
# Cron schedule for the daily scan. Default: 08:00 server time, every day.
# For quick local testing, temporarily override with e.g. "0 * * * * *" (every minute)
# in application-local.properties.
app.expiry-alerts.cron=0 0 8 * * *

# Local overrides last (set your real password in application-local.properties)
spring.config.import=optional:classpath:application-local.properties