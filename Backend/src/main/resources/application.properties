spring.application.name=zerowaste

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/zerowaste
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ──
app.jwt.secret=ZeroWasteSecretKeyChangeThisInProductionMustBeAtLeast32Chars
app.jwt.expiration-ms=86400000

# ── CORS (Vite dev server) ──
app.cors.allowed-origins=http://localhost:5173

# Local overrides last (set your real password in application-local.properties)
spring.config.import=optional:classpath:application-local.properties
