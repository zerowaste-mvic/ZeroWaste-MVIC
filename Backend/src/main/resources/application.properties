spring.application.name=zerowaste

# ── PostgreSQL ──
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zerowaste}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ──
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# ── CORS ──
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ── Mail (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_USERNAME:}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# ── 2FA OTP ──
app.2fa.otp-expiry-minutes=10

# ── Expiry Alerts ──
app.expiry-alerts.days-before=7
app.expiry-alerts.cron=0 0 8 * * *

# Local overrides (gitignored)
spring.config.import=optional:classpath:application-local.properties

#Server port (default to 8080 if not set)
server.port=${PORT:8080}