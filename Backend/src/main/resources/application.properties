
spring.application.name=zerowaste

# ── PostgreSQL ──
spring.datasource.url=jdbc:postgresql://localhost:5432/zerowaste
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ──
app.jwt.secret=ZeroWasteSecretKeyChangeThisInProductionMustBeAtLeast32Chars
app.jwt.expiration-ms=86400000

# ── CORS (Vite dev server) ──
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# 2FA OTP service configuration
# ── Mail (Gmail SMTP) ──
# Set MAIL_USERNAME and MAIL_PASSWORD as environment variables (use an App Password for Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_USERNAME:your-email@gmail.com}

# ── 2FA OTP ──
# How long (minutes) the OTP is valid before it expires
app.2fa.otp-expiry-minutes=10

# Local overrides last (set your real password in application-local.properties)
spring.config.import=optional:classpath:application-local.properties


